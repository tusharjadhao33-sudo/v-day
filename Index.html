<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Valentine ❤️</title>

  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
    }

    h1 {
      margin-top: 100px;
      color: #333;
    }

    button {
      padding: 12px 25px;
      margin: 10px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }

    #yes {
      background: #ff4d6d;
      color: white;
    }

    #no {
      background: gray;
      color: white;
      position: absolute;
    }
  </style>
</head>

<body>

<h1>Hey dear, will you be my Valentine? ❤️</h1>

<button id="yes" onclick="yesClicked()">Yes 💖</button>
<button id="no" onmouseover="moveButton()">No 😢</button>

<!-- 🎵 Background Music -->
<audio id="bgMusic" autoplay loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
function yesClicked() {
  alert("Yayyy ❤️ I love you so much!");
}

function moveButton() {
  const btn = document.getElementById("no");
  btn.style.top = Math.random() * window.innerHeight + "px";
  btn.style.left = Math.random() * window.innerWidth + "px";
}

// Fix autoplay (required for mobile)
document.body.addEventListener("click", function () {
  document.getElementById("bgMusic").play();
});
</script>

</body>
</html>
