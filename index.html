<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For Tushar ❤️</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #ffdde1;
    }
    h1 {
      margin-top: 100px;
    }
    button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
    #yes {
      background: #ff4d6d;
      color: white;
    }
    #no {
      background: gray;
      color: white;
      position: absolute;
    }
  </style>
</head>
<body>

<h1>Tushar, will you be my Valentine? ❤️</h1>

<button id="yes" onclick="yesClicked()">Yes 💖</button>
<button id="no" onmouseover="moveButton()">No 😢</button>

<script>
function yesClicked() {
  alert("Hey❤️ Have you Tushar!");
}

function moveButton() {
  const btn = document.getElementById("no");
  btn.style.top = Math.random() * window.innerHeight + "px";
  btn.style.left = Math.random() * window.innerWidth + "px";
}
</script>

</body>
</html>
